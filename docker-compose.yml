services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 5s
      retries: 5

  mock-server:
    build: ./mock-server
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  pipeline-service:
    build: ./pipeline-service
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MOCK_SERVER_URL: http://mock-server:5000
